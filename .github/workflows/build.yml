name: Build TETR.IO Optimizer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: x86_64-pc-windows-msvc
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Install Tauri CLI
      run: cargo install tauri-cli --version 2.0.0
    
    - name: Build Application
      run: |
        cd src-tauri
        cargo tauri build --target x86_64-pc-windows-msvc --verbose
    
    - name: Upload Windows Executable
      uses: actions/upload-artifact@v4
      with:
        name: tetrio-optimizer-windows
        path: src-tauri/target/x86_64-pc-windows-msvc/release/*.exe
        retention-days: 7
    
    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: tetrio-optimizer-installer
        path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
        retention-days: 7
