name: Release TETR.IO Optimizer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Permite execução manual

env:
  CARGO_TERM_COLOR: always
  TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
  TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    strategy:
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Rust (Windows)
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Install Tauri CLI via Cargo
      run: cargo install tauri-cli --version "^2.0.0"

    - name: Build Tauri App (Windows)
      run: cargo tauri build
      env:
        TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    - name: Move WebView2 DLL (Windows)
      run: python move-dll.py

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tetrio-optimizer-windows
        path: |
          src-tauri/target/release/bundle/msi/*.msi
          src-tauri/target/release/bundle/nsis/*.exe
        retention-days: 7

  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Rust (Linux)
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev

    - name: Install Tauri CLI via Cargo
      run: cargo install tauri-cli --version "^2.0.0"

    - name: Build Tauri App (Linux)
      run: cargo tauri build
      env:
        TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tetrio-optimizer-linux
        path: |
          src-tauri/target/release/bundle/deb/*.deb
          src-tauri/target/release/bundle/appimage/*.AppImage
        retention-days: 7

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: tetrio-optimizer-windows
        path: artifacts/windows

    - name: Download Linux artifacts
      uses: actions/download-artifact@v4
      with:
        name: tetrio-optimizer-linux
        path: artifacts/linux

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/windows/*.msi
          artifacts/windows/*.exe
          artifacts/linux/*.deb
          artifacts/linux/*.AppImage
        generate_release_notes: true
        prerelease: false